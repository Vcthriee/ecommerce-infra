name: Deploy Infrastructure

on:
  push:
    branches: [main, dev]
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.github/workflows/**'  # Add this

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: af-south-1

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: envs/dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::904690835870:role/GithubActionsOIDCROLE
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Download tfvars from S3
        run: aws s3 cp s3://cloudthrieesecurity-terraform-tfvars/ecommerce-infra/dev.tfvars terraform.auto.tfvars

      - run: terraform init -upgrade 
      - run: terraform fmt -check 
      - run: terraform validate 
      - run: terraform plan -out=tfplan -lock-timeout=5m

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' 
        run: terraform apply -auto-approve tfplan -lock-timeout=5m