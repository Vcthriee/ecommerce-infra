name: Destroy Ecommerce Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm you want to destroy all infrastructure"
        required: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: af-south-1

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    if: github.event.inputs.confirm == 'DESTROY'

    defaults:
      run:
        working-directory: envs/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::904690835870:role/GithubActionsOIDCROLE
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      # FIXED: Use S3 instead of broken secret
      - name: Download tfvars from S3
        run: aws s3 cp s3://cloudthrieesecurity-terraform-tfvars/ecommerce-infra/dev.tfvars terraform.auto.tfvars

      - name: Terraform Init
        run: terraform init -upgrade

      # NEW: Force unlock if stuck
      - name: Force Unlock Stale Locks
        run: terraform force-unlock -force $(terraform show -json 2>/dev/null | jq -r '.values.root_module.resources[] | select(.type=="aws_dynamodb_table") | .values.id' 2>/dev/null) 2>/dev/null || true
        continue-on-error: true

      - name: Terraform Plan Destroy
        run: terraform plan -destroy -var-file="terraform.auto.tfvars" -out=destroy-plan

      - name: Terraform Destroy
        run: terraform apply -auto-approve destroy-plan

      - name: Destroy summary
        if: always()
        run: |
          echo "================================"
          echo "DESTROY COMPLETE"
          echo "================================"