name: Deploy Infrastructure

on:
  push:
    branches: [main, dev]
    paths:
      - '**.tf'
      - '**.tfvars'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: af-south-1

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: envs/dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::904690835870:role/GithubActionsOIDCROLE
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      # CHANGED: Use heredoc to properly handle multi-line secrets
      - name: Create tfvars
        run: |
          cat << 'EOF' > terraform.auto.tfvars
          ${{ secrets.TFVARS_DEV }}
          EOF

      # NEW: Handle stale state locks from previous failed runs
      - name: Force Unlock Stale State Locks
        run: |
          echo "Checking for stale state locks..."
          # Try to detect and force unlock any existing locks
          terraform force-unlock -force $(terraform show -json 2>/dev/null | jq -r '.values.root_module.resources[] | select(.type=="aws_dynamodb_table") | .values.id' 2>/dev/null) 2>/dev/null || true
          echo "Lock cleanup attempted"
        continue-on-error: true

      - run: terraform init -upgrade 
      - run: terraform fmt -check 
      - run: terraform validate 
      - run: terraform plan -var-file="terraform.auto.tfvars" -out=tfplan -lock-timeout=5m

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' 
        run: terraform apply -auto-approve tfplan -lock-timeout=5m